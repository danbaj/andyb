<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Andre Bajer - Personal Website">
    <title>Andre Bajer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ── Colour Variables ── */
        :root {
            --gold:         #f0c060;   /* contrast 7.2:1 on dark green ✅ AAA */
            --gold-border:  #c9a84c;   /* contrast 5.1:1 on dark green ✅ AA  */
            --green-bg:     #1a2e1a;
            --green-panel:  #243d24;
            --text-primary: #f5efe0;   /* contrast 13.1:1 on panel    ✅ AAA */
        }

        /* ── Base Reset ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── Body ── */
        body {
            font-family: 'Cinzel', serif;
            font-size: 18px;           /* Base font size increased */
            min-height: 100vh;
            background-color: var(--green-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* ── Frame ── */
        .frame {
            border: 3px solid var(--gold-border);
            outline: 1px solid var(--gold-border);
            outline-offset: -8px;
            padding: 60px 80px;
            background-color: var(--green-panel);
            text-align: center;
            max-width: 520px;
            width: 100%;
        }

        /* ── Ornament ── */
        .ornament {
            display: block;
            color: var(--gold-border);
            font-size: 1rem;
            letter-spacing: 8px;
            margin-bottom: 12px;
        }

        /* ── Divider ── */
        .divider {
            width: 60%;
            margin: 24px auto;
            border: none;
            border-top: 1px solid var(--gold-border);
        }

        /* ── H1 ── */
        h1 {
            font-size: 2.8rem;         /* ~50px */
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 4px;
            line-height: 1.2;
        }

        /* ── Subtitle ── */
        .subtitle {
            font-size: 1.1rem;         /* ~20px */
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 2px;
            margin: 4px 0;
        }

        /* ── Contact Label ── */
        .contact-label {
            font-size: 0.85rem;        /* ~15px */
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
        }

        /* ── Contact Link ── */
        .contact-link {
            font-size: 1.1rem;         /* ~20px */
            color: var(--text-primary);
            text-decoration: underline;
            text-underline-offset: 6px;
            letter-spacing: 1px;
        }

        /* ── Focus & Hover (WCAG 2.4.7) ── */
        .contact-link:hover {
            color: var(--gold);
        }

        .contact-link:focus-visible {
            outline: 3px solid var(--gold);
            outline-offset: 6px;
            border-radius: 2px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 2px;
            }
            .frame {
                padding: 40px 24px;
            }
        }
    </style>
</head>
<body>

    <main>
        <div class="frame">
            <span class="ornament" aria-hidden="true">◆ ◆ ◆</span>

            <h1>Andre Bajer</h1>

            <hr class="divider">

            <p class="subtitle">Site under construction.</p>

            <hr class="divider">

            <p class="contact-label">Contact</p>
            <a class="contact-link" href="andre.bajer@yahoo.com">
                andre.bajer@yahoo.com
            </a>

            <span class="ornament" aria-hidden="true" style="margin-top: 24px;">◆ ◆ ◆</span>
        </div>
    </main>

</body>
</html>
