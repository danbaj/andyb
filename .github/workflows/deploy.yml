name: Deploy to andrebajer.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: ✅ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔧 Build Angular project
        run: npm run build

      - name: 📦 Install sshpass
        run: sudo apt-get install -y sshpass

      - name: 📤 Deploy files via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          cd dist/andyb
          sshpass -e sftp -o StrictHostKeyChecking=no \
            ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_SERVER }} << 'SFTP'
            cd /home/A/andrebajercom/www
            mput *
            put .htaccess
            bye
          SFTP

      - name: 🖼️ Deploy images via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sshpass -e sftp -o StrictHostKeyChecking=no \
            ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_SERVER }} << 'SFTP'
            cd /home/A/andrebajercom/www
            mkdir images
            cd images
            lcd dist/andyb/images
            mput *
            bye
          SFTP